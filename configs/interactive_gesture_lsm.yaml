wandb_project: 'GestureLSM'
exp_name: 'interactive_gesture_lsm_3_9_id_ladder_slice'

wandb_entity: 'xxxx'
wandb_key: "xxxxxxx"
wandb_log_dir: './outputs/wandb'
output_dir: ./outputs/interactive_gesture_lsm
log_period: 50
val_period: 10
max_val_samples: 10

# ============================================
# 单卡训练配置（默认）
# ============================================
# gpus: [0]
# ddp: false

# ============================================
# 多卡分布式训练配置示例
# 取消注释以下配置并注释上面的单卡配置即可启用
# ============================================
# gpus: [0, 1, 2, 3]  # 使用的 GPU 列表
# ddp: true           # 启用分布式数据并行
gpus: [0,1,2,3,4,5,6,7]
ddp: true
# 注意：多卡训练时，总 batch size = train_bs * len(gpus)
# 例如：train_bs=64, gpus=[0,1,2,3] -> 总 batch size = 256

seed: 42 #42
debug: false

vqvae_upper_path: ./outputs/rvq_seamless/seamless_64frame_1024batch_128dim_1024code_upper/net_best.pth
vqvae_hands_path: ./outputs/rvq_seamless/seamless_64frame_1024batch_128dim_1024code_hands/net_best.pth
vqvae_lower_path: ./outputs/rvq_seamless/seamless_64frame_1024batch_128dim_1024code_lower_trans/net_best.pth

grad_ckpt: false

# 是否使用 translation 数据
# true: 使用真实的 translation 数据 (lower body 维度 57)
# false: 使用零填充代替 translation (保持维度 57，但 translation 部分为零)
use_trans: False

pre_frames: 4
vqvae_squeeze_scale: 4
vqvae_latent_scale: 1 #5
vae_length: 256 #240
vae_test_len: 32
mean_pose_path: "./mean_std_seamless/mean_pose.npy"
std_pose_path: "./mean_std_seamless/std_pose.npy"
mean_trans_path: "./mean_std_seamless/mean_trans.npy"
std_trans_path: "./mean_std_seamless/std_trans.npy"

data:
  name_pyfile: "dataloaders.dyadic_feedback_dataset"
  class_name: "DyadicFeedbackDataset"
  train_bs: 256 #128
  multi_length_training: [1.0]
  root_path: ./
  beat_align: True
  pose_rep: smplxflame_30
  
  pose_norm: True
  pose_fps: 30
  rot6d: True
  pose_dims: 825
  pose_length: 64
  stride: 20
  test_length: 256
  audio_sr: 48000
  audio_fps: 100
  audio_norm: False
  
  data_path_1: ./datasets/hub/
  data_path: ./datasets/seamless_interaction/improvised/
  additional_data: False
  cache_path: ./cache/dyadic_feedback
  cache_dir: ./cache/dyadic_feedback
  new_cache: False  # 强制重新构建缓存
  disable_filtering: False
  clean_first_seconds: 0
  clean_final_seconds: 0
  min_speak_duration: 10.0 #5.0

  audio_rep: mfcc
  word_rep: json
  t_pre_encoder: fasttext
  facial_rep: null
  id_rep: integer
  emo_rep: null
  sem_rep: null
  test_clip: False
  onset_rep: True

model:
  model_name: interactive_gesture_lsm
  g_name: InteractiveGestureLSM
  do_classifier_free_guidance: True
  guidance_scale: 2.0
  n_steps: 3 #12
  use_exp: False
  use_id: true #False
  max_id: 5000
  id_embedding_dim: 256
  
  denoiser:
    target: models.interactive_denoiser.InteractiveGestureDenoiser
    params:
      input_dim: 128
      latent_dim: 256
      ff_size: 1024
      num_layers: 8
      num_heads: 4
      dropout: 0.2 #0.1
      activation: "gelu"
      n_seed: 4 #8 #只有 pre_frames 和 n_seed 必须一致
      seq_len: 12 # window_size
      flip_sin_to_cos: True
      freq_shift: 0.0
      cond_proj_dim: 256 #512
      use_exp: ${model.use_exp}
      num_feedback_attn_layers: 3
      # embed_context_multiplier: 4 #2
  
  modality_encoder:
    target: models.layers.modality_encoder.ModalityEncoder
    params:
      data_path: ./datasets/seamless_interaction/improvised/
      vocab_path: ./datasets/unified_vocab.pkl
      t_fix_pre: False
      audio_dim: 256
      audio_in: 128
      raw_audio: False
      latent_dim: 256
      audio_fps: 100
      # target_length: 64
      # val_target_length: 256
      spatial_temporal: True
      use_exp: ${model.use_exp}

  window_size: 12 #24
  context_size: 4 #4 #8
  ladder_step: 4 #4
  # noise_range: [0, 1]
  
  # 实时模式：Listener 使用历史动作而非未来动作
  # 适用于机器人部署等实时生成场景
  # realtime_mode: true
  
  # 是否使用 Listener 反馈（消融实验用）
  # 设为 false 可禁用 Listener 视觉反馈，仅使用音频生成动作
  use_listener_feedback: true
  
  inertia_weight: 0
  ofs_threshold: 1 #0.8
  consistency_ratio: 0.25 #0.25
  
  # 损失函数类型: "mse" 或 "huber"
  # mse: 标准均方误差，对所有误差一视同仁
  # huber: 对小误差使用平方，对大误差使用线性，对异常值更鲁棒
  loss_type: huber
  huber_delta: 1.0  # Huber损失的阈值参数，仅在loss_type="huber"时生效
  
  cond_drop_prob: 0.2
  force_cfg_prob: 0.8  # 一致性损失中强制使用 null embedding 的概率
  # context_noise_prob: 0.2 #0.3
  # max_context_noise: 0.2
  # listener_drop_prob: 0.1
  
  # Scheduled Sampling: 训练时以一定概率使用预测值替代真值作为 context
  # 0.0: 禁用（始终使用真值）
  # 1.0: 始终使用预测值
  # 推荐值: 0.1-0.3，逐步增加
  scheduled_sampling_prob: 0 #0.3
  
  # ============================================
  # Seed 噪声模拟（解决 Exposure Bias 问题）
  # ============================================
  # 训练时为滚动阶段的 seed 添加噪声，模拟推理时的预测误差
  # seed_noise_prob: 滚动阶段添加噪声的概率（0.0 = 禁用）
  # seed_noise_level: 噪声水平范围 [min, max]（当不使用 error_stats 时生效）
  # error_stats_path: 预计算的误差统计文件路径（推荐，用于结构化噪声）
  seed_noise_prob: 0.2       # 先禁用，等模型稳定后再开启
  seed_noise_level: [0.05, 0.1]  # 降低噪声水平
  # error_stats_path: "./error_statistics.pt"  # 使用收集的误差统计
  
  # ============================================
  # Seed 渐进式融合（解决 Exposure Bias 问题）
  # ============================================
  # 推理时将 GT seed 和预测 seed 渐进融合，避免突然切换
  # seed_blend_mode: 融合模式 ("none", "linear", "exponential", "cosine")
  #   - none: 不融合，直接使用预测值
  #   - linear: 线性衰减 α = 1 - progress
  #   - exponential: 指数衰减 α = exp(-3 * progress)
  #   - cosine: 余弦衰减 α = 0.5 * (1 + cos(π * progress))
  # seed_blend_warmup: 融合过渡的帧数（从全 GT 过渡到全预测值）
  seed_blend_mode: "cosine"  # 推荐使用 cosine
  seed_blend_warmup: 100     # 100 帧内完成过渡
  
  # use_gt_seed_inference: 推理时是否使用 GT seed（oracle 模式）
  #   - false: 使用预测值作为 seed（正常推理模式）
  #   - true: 始终使用 GT seed（oracle 模式，用于对比实验）
  use_gt_seed_inference: true #false
  
  use_dual_phase: true      # 启用双阶段调度（训练时）
  pre_roll_prob: 0.2        # 预滚动阶段采样概率
  pre_roll_steps: 3        # 预滚动阶段去噪步数（独立于 window_size） 12
  inference_mode: "rflav_ladder"   # 推理模式: "rflav" 或 "rdla" 或 "rflav_ladder" 或 "sliding_window"
  
  # 时间步加权模式（消融实验用）
  # "none": 无加权（默认）
  # "logit_normal": Logit-Normal 加权，中间时间步权重高
  # "window_aware": 窗口感知加权，首帧权重高（输出帧更重要）
  timestep_weighting: "logit_normal"
  timestep_weight_scale: 1.0  # 加权缩放因子

  train_body_part: null #"upper"

# validation:
#   val_loss_steps: 200
#   validation_steps: 1000
  # 在线交互模式验证：模拟真实在线交互场景
  # 使用 OnlineListenerLoader 按时间步提供 Listener 历史
  # online_validation: true

solver:
  opt: 'adamw'
  epochs: 1000
  grad_norm: 1.0
  momentum: 0.8
  nesterov: True
  amsgrad: False
  
  lr_base: 1e-5
  lr_policy: 'exponential' #cosine #step
  gamma: 0.99
  decay_rate: 0.1
  # lr_warmup_steps: 50
  decay_epochs: 500
  warmup_epochs: 10
  warmup_lr: 1e-6
  lr_min: 1e-7
  COOLDOWN_EPOCHS: 10  # Cosine scheduler 冷却期 epoch 数
  weight_decay: 1e-2
  opt_betas: [0.5, 0.999]
  
  early_stopping:
    enabled: true
    patience: 5
    delta: 0.001
